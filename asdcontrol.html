<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Azimutal 2D Integrado</title>
    <link rel="stylesheet" href="css/asdcontrol.css">
</head>
<body>
    <div id="container">
        <div class="controls-row">
            <div class="control-wrapper">
                <h3>Bombordo (BB)</h3>
                <canvas id="azimuth-control-bb" class="control-canvas"></canvas>
            </div>
            <div class="control-wrapper">
                <h3>Boreste (BE)</h3>
                <canvas id="azimuth-control-be" class="control-canvas"></canvas>
            </div>
        </div>

        <div id="functions-panel">
            <button id="start-bb" class="function-button">
                <svg viewBox="0 0 24 24"><path d="M10 8.64v6.72L15.27 12z M8 4v16l11-8z"></path></svg>
                <span>Partir BB</span>
            </button>
            <button id="couple-bb" class="function-button" disabled>
                 <svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61-.25-1.17-.59-1.69-.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24-.42-.12-.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69-.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l-.38-2.65c.61-.25 1.17-.59-1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"></path></svg>
                <span>Acoplar BB</span>
            </button>
            <button id="couple-be" class="function-button" disabled>
                 <svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61-.25-1.17-.59-1.69-.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24-.42-.12-.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69-.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"></path></svg>
                <span>Acoplar BE</span>
            </button>
            <button id="start-be" class="function-button">
                <svg viewBox="0 0 24 24"><path d="M10 8.64v6.72L15.27 12z M8 4v16l11-8z"></path></svg>
                <span>Partir BE</span>
            </button>
        </div>

        <div id="telemetry-panel">
            <div class="prop-section">
                <h4>Bombordo (BB)</h4>
                <div class="indicator-group">
                    <canvas id="angle-canvas-bb" class="angle-canvas"></canvas>
                    <div class="indicator-readout">
                        <div id="angle-value-bb" class="value">0°</div>
                        <div class="unit">Ângulo</div>
                    </div>
                </div>
                 <div class="indicator-group">
                    <canvas id="rpm-canvas-bb" class="gauge-canvas"></canvas>
                    <div class="indicator-readout">
                        <div id="rpm-value-bb" class="value">0</div>
                        <div class="unit">RPM</div>
                    </div>
                </div>
            </div>
            <div class="prop-section">
                <h4>Boreste (BE)</h4>
                 <div class="indicator-group">
                    <canvas id="angle-canvas-be" class="angle-canvas"></canvas>
                    <div class="indicator-readout">
                        <div id="angle-value-be" class="value">0°</div>
                        <div class="unit">Ângulo</div>
                    </div>
                </div>
                 <div class="indicator-group">
                    <canvas id="rpm-canvas-be" class="gauge-canvas"></canvas>
                    <div class="indicator-readout">
                        <div id="rpm-value-be" class="value">0</div>
                        <div class="unit">RPM</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/asdcontrol.js"></script>
</body>
</html>
